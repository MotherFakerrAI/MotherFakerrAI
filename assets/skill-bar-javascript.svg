<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60">
  <!-- 背景 -->
  <rect width="400" height="60" fill="#0D1117" rx="8" />
  
  <!-- 进度条背景 -->
  <rect x="20" y="35" width="360" height="8" fill="#1C2128" rx="4" />
  
  <!-- 进度条（橙色渐变） -->
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 85% 进度 -->
  <rect x="20" y="35" width="306" height="8" fill="url(#orangeGrad)" rx="4">
    <animate attributeName="width" from="0" to="306" dur="1.5s" fill="freeze" />
  </rect>
  
  <!-- 文字 -->
  <text x="20" y="20" fill="#FFFFFF" font-family="Fira Code, monospace" font-size="14" font-weight="bold">
    JavaScript
  </text>
  <text x="390" y="20" fill="#FF6600" font-family="Fira Code, monospace" font-size="12" text-anchor="end" font-weight="bold">
    85%
  </text>
  
  <!-- 终端提示符 -->
  <text x="20" y="52" fill="#00A8FF" font-family="Fira Code, monospace" font-size="10">
    $
  </text>
</svg>
